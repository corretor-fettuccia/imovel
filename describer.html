function optValue(opt){return Array.isArray(opt)?opt[0]:opt.value}function optText(opt){return Array.isArray(opt)?opt[1]:opt.label}
function placeholderKey(section,group,field){return `JOKER-${section.category}-${group.id}-${field.placeholderName||field.id.toUpperCase()}`.replace(/_/g,'-').toUpperCase()}
function renderForm(){let html='';config.sections.forEach(section=>{html+=`<div class="section" data-section="${section.id}"><h2><i class="fa-solid ${section.icon}"></i>${section.label}<span class="tax">${section.category}</span></h2>`;section.groups.forEach(group=>{html+=`<div class="group-title">${group.label}</div><div class="fields">`;group.fields.forEach(field=>{const key=placeholderKey(section,group,field);const cls=`field ${field.full?'full':''} ${field.conditional?'conditional':''}`;html+=`<div class="${cls}" id="field-${field.id}" data-field="${field.id}"><label for="${field.id}">${field.label}${field.required?' <span style="color:#b42318">*</span>':''}<span class="ph">${key}</span></label>`; if(field.type==='select'){let opts=field.options==='propertyTypes'?config.propertyTypes:field.options;html+=`<select id="${field.id}" ${field.required?'required':''}><option value="">Selecione...</option>`;opts.forEach(o=>html+=`<option value="${optValue(o)}">${optText(o)}</option>`);html+='</select>'}else if(field.type==='textarea'){html+=`<textarea id="${field.id}" placeholder="${field.placeholder||''}">${field.default||''}</textarea>`}else{html+=`<input type="${field.type||'text'}" id="${field.id}" placeholder="${field.placeholder||''}" value="${field.default||''}">`}html+=`</div>`});html+='</div>'});html+='</div>'});formRenderer.innerHTML=html;document.getElementById('tipo').addEventListener('change',onTypeChange);onTypeChange()}
function onTypeChange(){const type=document.getElementById('tipo')?.value||'';document.querySelectorAll('.conditional').forEach(el=>el.classList.add('hidden'));if(!type){document.querySelectorAll('.conditional').forEach(el=>el.classList.remove('hidden'));return}Object.entries(config.fieldVisibility).forEach(([fid,types])=>{if(types.includes(type)){document.getElementById('field-'+fid)?.classList.remove('hidden')}})}
function collect(){const data={};config.sections.forEach(s=>s.groups.forEach(g=>g.fields.forEach(f=>{data[f.id]=document.getElementById(f.id)?.value?.trim()||''})));return data}
function isVisibleField(id){return !document.getElementById('field-'+id)?.classList.contains('hidden')}function normalizeValue(v){return typeof v==='string'?v.trim():v}
function add(values,key,value,includeEmpty){value=normalizeValue(value);if(includeEmpty||value!==''&&value!=null) values[key]=value??''}
function generateJSON(){const data=collect(), includeEmpty=document.getElementById('includeEmpty').checked, includeDerived=document.getElementById('includeDerived').checked, includeCopy=document.getElementById('includeCopy').checked, includeSchema=document.getElementById('includeSchema').checked;const values={};let requiredMissing=[];
 config.sections.forEach(section=>section.groups.forEach(group=>group.fields.forEach(field=>{if(field.required&&!data[field.id]) requiredMissing.push(field.label);if(field.conditional&&!isVisibleField(field.id)) return; if(section.category==='COPY'&&!includeCopy) return; if(section.category==='SEO'&&group.id==='SCHEMA'&&!includeSchema) return; const raw=data[field.id]||''; const key=placeholderKey(section,group,field); let val=raw; if(field.type==='select'&&raw){val=optLabel(field.options,raw)} add(values,key,val,includeEmpty)})));
 if(includeDerived){addDerived(values,data,includeEmpty,includeSchema)}
 const result={_meta:{tipo:'preset-taxonomico',versao:config.version,geradoEm:new Date().toISOString(),totalPlaceholders:Object.keys(values).length,templateSize:JSON.stringify(values).length,padrao:'JOKER-CATEGORIA-GRUPO-CAMPO',segmentacao:['DADOS','LOCAL','DIMENSAO','COMODOS','INFRAESTRUTURA','USO','JURIDICO','MERCADO','COPY','SEO','SCHEMA'],observacao:'Gerado sem copy inventada obrigatória. Campos derivados são criados apenas a partir de dados preenchidos.'},valores:values};lastJSON=result;displayJSON(result);validate(result,requiredMissing);showToast(`JSON gerado com ${Object.keys(values).length} placeholders`);return result}
function addDerived(values,d,includeEmpty,includeSchema){const tipo=optLabel('propertyTypes',d.tipo);const loc=[d.logradouro,d.numero,d.bairro,d.cidade,d.uf].filter(Boolean).join(d.uf?' - ':', ');add(values,'JOKER-LOCAL-ENDERECO-COMPLETO',loc,includeEmpty); const resumo=[tipo,d.subtipo,d.dormitorios?`${d.dormitorios} dormitórios`:'',d.banheiros?`${d.banheiros} banheiros`:'',d.area_construida?`${d.area_construida} m² construídos`:'',d.bairro&&d.cidade?`${d.bairro}, ${d.cidade}`:''].filter(Boolean).join(' | ');add(values,'JOKER-IMOVEL-RESUMO-TECNICO',resumo,includeEmpty); if(d.preco)add(values,'JOKER-MERCADO-PRECO-VALOR-FORMATADO',d.preco.startsWith('R$')?d.preco:`R$ ${d.preco}`,includeEmpty); const voc=['voc_residencial','voc_comercial','voc_misto','voc_clinica','voc_escritorio','voc_restaurante','voc_investimento'].filter(k=>d[k]==='sim').map(k=>k.replace('voc_','')).join(', ');add(values,'JOKER-USO-VOCACAO-LISTA',voc,includeEmpty); if(!d.seo_title){add(values,'JOKER-SEO-META-TITLE-AUTO',resumo.slice(0,60),includeEmpty)} if(!d.seo_description){add(values,'JOKER-SEO-META-DESCRIPTION-AUTO',resumo?`${resumo}. Consulte condições, localização e detalhes do imóvel.`.slice(0,155):'',includeEmpty)} if(includeSchema){const schema={};if(d.schema_tipo) schema['@type']=d.schema_tipo;if(d.nome) schema.name=d.nome;if(d.seo_description||resumo) schema.description=d.seo_description||resumo;if(d.url_maps) schema.hasMap=d.url_maps;if(d.broker_nome||d.broker_email||d.broker_telefone) schema.provider={'@type':'RealEstateAgent',name:d.broker_nome||'',email:d.broker_email||'',telephone:d.broker_telefone||''};add(values,'JOKER-SCHEMA-JSONLD-SEGURO',Object.keys(schema).length?JSON.stringify(schema):'',includeEmpty)}}
function validate(obj,requiredMissing){const keys=Object.keys(obj.valores);const bad=keys.filter(k=>!/^JOKER-[A-Z0-9]+-[A-Z0-9]+-[A-Z0-9-]+$/.test(k));const empty=keys.filter(k=>obj.valores[k]==='').length;let html='<b>Validação</b>';html+=bad.length?`<div class="bad">${bad.length} chaves fora do padrão 4 níveis.</div>`:'<div class="ok">Todas as chaves seguem 4 níveis.</div>';html+=requiredMissing.length?`<div class="bad">Obrigatórios ausentes: ${requiredMissing.join(', ')}</div>`:'<div class="ok">Obrigatórios OK.</div>';html+=`<div class="warn">${empty} campos vazios incluídos.</div>`;validation.innerHTML=html}
function displayJSON(obj){const esc=JSON.stringify(obj,null,2).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');preview.innerHTML=esc.replace(/("(?:[^"\\]|\\.)*")(?=\s*:)/g,'<span class="json-key">$1</span>').replace(/: ("(?:[^"\\]|\\.)*")/g,': <span class="json-string">$1</span>').replace(/: (\d+\.?\d*)/g,': <span class="json-number">$1</span>').replace(/: (true|false)/g,': <span class="json-boolean">$1</span>').replace(/: (null)/g,': <span class="json-null">$1</span>').replace(/([{}\[\]])/g,'<span class="json-brace">$1</span>')}
function copyJSON(){if(!lastJSON)return showToast('Gere um JSON primeiro');navigator.clipboard.writeText(JSON.stringify(lastJSON,null,2)).then(()=>showToast('JSON copiado'))}
function downloadJSON(){if(!lastJSON)return showToast('Gere um JSON primeiro');const blob=new Blob([JSON.stringify(lastJSON,null,2)],{type:'application/json;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(document.getElementById('nome')?.value||'joker-preset').replace(/\s+/g,'_')+'.json';a.click();URL.revokeObjectURL(a.href);showToast('JSON baixado')}
function resetForm(){document.querySelectorAll('input[type=text],textarea').forEach(el=>el.value=el.defaultValue||'');document.querySelectorAll('select').forEach(el=>el.selectedIndex=0);lastJSON=null;preview.innerHTML='<div class="empty"><i class="fa-solid fa-database"></i>Preencha e gere o preset JSON.</div>';validation.innerHTML='<b>Validação</b><span class="warn">Aguardando geração.</span>';onTypeChange();showToast('Formulário limpo')}
function exportConfig(){const blob=new Blob([JSON.stringify(config,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='joker_config_10_10.json';a.click();URL.revokeObjectURL(a.href);showToast('Config exportada')}
function importConfigFile(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const imported=JSON.parse(ev.target.result);if(!imported.sections||!imported.propertyTypes)throw new Error('estrutura inválida');config=imported;renderForm();showToast('Config importada')}catch(err){showToast('Erro: '+err.message)}};r.readAsText(file);e.target.value=''}
renderForm();window.generateJSON=generateJSON;window.copyJSON=copyJSON;window.downloadJSON=downloadJSON;window.resetForm=resetForm;window.exportConfig=exportConfig;window.importConfigFile=importConfigFile;window.onTypeChange=onTypeChange;
</script>
</body>
